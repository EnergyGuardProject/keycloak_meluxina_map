<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Slurm Token</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; }
    .card { max-width: 460px; margin: 8vh auto; background: #fff; padding: 28px 32px;
            border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.sub { color: #666; margin: 0 0 20px; font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 14px;
            border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 20px; width: 100%; padding: 11px; font-size: 15px; border: 0;
             border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .flash { padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 14px; }
    .flash.success { background: #e7f6ec; color: #166534; }
    .flash.error { background: #fde8e8; color: #991b1b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set team Slurm token</h1>
    <p class="sub">Applies the token to every Keycloak user in the team.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" action="{{ url_for('set_team_token') }}">
      <label for="team_name">Team name</label>
      <input id="team_name" name="team_name" type="text" autocomplete="off" required>

      <label for="slurm_token">Slurm token</label>
      <input id="slurm_token" name="slurm_token" type="password" autocomplete="off" required>

      <label for="meluxina_project_name">MeluXina project name</label>
      <input id="meluxina_project_name" name="meluxina_project_name" type="text" autocomplete="off" required>

      <button type="submit">Save token</button>
    </form>
  </div>
</body>
</html>
