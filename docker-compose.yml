services:
  api:
    build: ./api
    container_name: keycloak-slurm-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${API_PORT}:${API_PORT}"
    networks:
      # Shared network: reaches the pgdb data store.
      - nginxproxy_energyguard_net
      # Dashboard's own compose network: reaches its Postgres (`db`) to read
      # team membership, exactly as the dashboard `web` service does.
      - dashboard_net

  frontend:
    build: ./frontend
    container_name: keycloak-slurm-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: "${API_BASE_URL}"
      API_KEY: "${API_KEY}"
      FRONTEND_SECRET: "${FRONTEND_SECRET:-change-me}"
      FRONTEND_PORT: "${FRONTEND_PORT}"
    # Localhost only -> reach via port-forwarding.
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - api
    networks:
      - nginxproxy_energyguard_net

networks:
  nginxproxy_energyguard_net:
    external: true
  dashboard_net:
    external: true
    name: energyguard-frontend_default
