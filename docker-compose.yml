services:
  api:
    build: ./api
    container_name: keycloak-slurm-api
    restart: unless-stopped
    env_file:
      - .env
    # Published on localhost only (reach it through SSH port-forwarding, never
    # the open internet). The slurm consumer on the same docker network can
    # also reach it directly at http://keycloak-slurm-api:27431.
    ports:
      - "127.0.0.1:27431:27431"
    networks:
      # Shared network: reaches the pgdb data store.
      - nginxproxy_energyguard_net
      # Dashboard's own compose network: reaches its Postgres (`db`) to read
      # team membership, exactly as the dashboard `web` service does.
      - dashboard_net

  frontend:
    build: ./frontend
    container_name: keycloak-slurm-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://keycloak-slurm-api:27431"
      API_KEY: "${API_KEY}"
      FRONTEND_SECRET: "${FRONTEND_SECRET:-change-me}"
    # Localhost only -> reach via port-forwarding.
    ports:
      - "127.0.0.1:27432:27432"
    depends_on:
      - api
    networks:
      - nginxproxy_energyguard_net

networks:
  nginxproxy_energyguard_net:
    external: true
  # The EnergyGuard dashboard's project-default network, where its Postgres
  # (`db`) lives. Confirm the exact name with `docker network ls` (compose
  # derives it from the dashboard's project directory) and adjust if needed.
  dashboard_net:
    external: true
    name: energyguard-frontend_default
